---
- name: Add sublime-text repository
  become: true
  ansible.builtin.deb822_repository:
    name: sublime-text
    types: deb
    uris: https://download.sublimetext.com
    suites: apt/stable/
    signed_by: https://download.sublimetext.com/sublimehq-pub.gpg

- name: Install sublime-text
  become: true
  ansible.builtin.apt:
    name: sublime-text
    state: present
    update_cache: true
